name: TS React Frontend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  typescript-frontend:
    name: TS React Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Run Oxlint Linter
        run: npm run lint

      - name: Run Frontend Tests
        run: npm run test

      - name: Run Production Build
        run: npm run build
